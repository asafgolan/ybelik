</g>

<line x1="340" y1="270" x2="340" y2="302" class="arr" marker-end="url(#arrow)"/>

<text class="th" x="340" y="300" text-anchor="middle">Stage 2 — Subscriber confirmed</text>

<g class="c-purple">
