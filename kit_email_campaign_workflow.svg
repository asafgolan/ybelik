  <text class="ts" x="340" y="347" text-anchor="middle" dominant-baseline="central">Double opt-in (they click to confirm)</text>
</g>

<line x1="340" y1="362" x2="340" y2="394" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
