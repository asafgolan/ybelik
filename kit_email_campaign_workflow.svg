  <text class="ts" x="340" y="431" text-anchor="middle" dominant-baseline="central">Tagged, segmented in Kit</text>
</g>

<line x1="340" y1="446" x2="220" y2="478" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="446" x2="460" y2="478" class="arr" marker-end="url(#arrow)"/>

<text class="th" x="340" y="476" text-anchor="middle">Stage 3 — Engage</text>

<g class="c-amber">
