  <text class="ts" x="200" y="525" text-anchor="middle" dominant-baseline="central">Welcome email (auto)</text>
</g>

<g class="c-blue">
  <rect x="360" y="488" width="240" height="52" rx="8" stroke-width="0.5"/>
